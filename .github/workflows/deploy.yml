name: Deploy portfolio to GitHub Pages

# Déploie automatiquement le site à chaque push sur la branche main.
on:
  push:
    branches: [main]
  workflow_dispatch:        # permet aussi un déclenchement manuel

# Permissions requises par GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Une seule exécution à la fois ; on n'annule pas un déploiement en cours
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # On publie tout le dépôt (site statique : index.html + assets/)
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
